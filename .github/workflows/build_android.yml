name: Build Android .so
on: [workflow_call, workflow_dispatch]

jobs:
  build_android:
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout nakama-cpp
        uses: actions/checkout@v4
        with:
          path: nakama-cpp
          submodules: false

      - name: Checkout vcpkg submodule
        run: |
          git submodule update --init --filter=blob:none -- submodules/vcpkg
        working-directory: nakama-cpp

      - uses: ./nakama-cpp/.github/actions/setup-android
        with:
          ndk-version: 27.2.12479018
          cmake-version: 4.0.2
      
      - uses: ./nakama-cpp/.github/actions/setup-vcpkg-android
        with:
          vcpkg-path: nakama-cpp/submodules/vcpkg

      - name: Build .so with CMake directly
        run: |
          export VCPKG_DEFAULT_TRIPLET=arm64-android
          export VCPKG_TARGET_TRIPLET=arm64-android
          cmake -B build-android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_static \
            -DBUILD_C_API=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DWITH_HTTP_CURL=OFF \
            -DWITH_WS_WSLAY=OFF
          cmake --build build-android
        working-directory: nakama-cpp

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nakama-sdk-android-so
          path: nakama-cpp/build-android/*.so
          if-no-files-found: error
