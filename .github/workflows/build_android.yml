name: Build Android .so
on: [workflow_call, workflow_dispatch]

jobs:
  build_android:
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout nakama-cpp
        uses: actions/checkout@v4
        with:
          path: nakama-cpp
          submodules: false

      - uses: ./nakama-cpp/.github/actions/setup-android
        with:
          ndk-version: 27.2.12479018
          cmake-version: 4.0.2

      - name: Install rapidjson (header-only)
        run: |
          git clone https://github.com/Tencent/rapidjson.git /tmp/rapidjson

      - name: Build .so with CMake directly
        run: |
          cmake -B build-android \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_STL=c++_static \
            -DBUILD_C_API=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DWITH_HTTP_CURL=OFF \
            -DWITH_WS_WSLAY=OFF \
            -DRapidJSON_DIR=/tmp/rapidjson \
            -DCMAKE_DISABLE_FIND_PACKAGE_Vcpkg=ON \
            -DVCPKG_MANIFEST_FEATURES=""
          cmake --build build-android
        working-directory: nakama-cpp

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nakama-sdk-android-so
          path: nakama-cpp/build-android/*.so
          if-no-files-found: error
